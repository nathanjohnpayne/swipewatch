name: Weekly PR Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  audit:
    name: Audit Merged PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Audit merged PRs for review policy compliance
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            // Read reviewer accounts from review-policy.yml
            let reviewerAccounts;
            let authorIdentity;
            try {
              const config = yaml.load(fs.readFileSync('.github/review-policy.yml', 'utf8'));
              reviewerAccounts = config.available_reviewers || [];
              authorIdentity = config.author_identity || 'nathanjohnpayne';
            } catch (e) {
              console.log('WARNING: Could not read review-policy.yml, using defaults');
              reviewerAccounts = ['nathanpayne-claude', 'nathanpayne-codex', 'nathanpayne-cursor'];
              authorIdentity = 'nathanjohnpayne';
            }

            const since = new Date();
            since.setDate(since.getDate() - 7);
            const sinceISO = since.toISOString();
            const today = new Date().toISOString().split('T')[0];

            // Get merged PRs from the past 7 days
            const prs = await github.paginate(
              github.rest.pulls.list,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
              }
            );

            const mergedPRs = prs.filter(
              pr => pr.merged_at && new Date(pr.merged_at) >= since
            );

            const violations = [];

            for (const pr of mergedPRs) {
              const prViolations = [];

              // Check 1: Missing Self-Review section
              if (!pr.body || !pr.body.match(/^## Self-Review/m)) {
                prViolations.push('Missing `## Self-Review` section');
              }

              // Check 2: Had needs-external-review label — verify approval from a reviewer identity
              const hadExternalLabel = pr.labels.some(
                l => l.name === 'needs-external-review'
              );

              if (hadExternalLabel) {
                const reviews = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });

                const approvals = reviews.data.filter(
                  r => r.state === 'APPROVED'
                );

                // Per REVIEW_POLICY.md: external-review PRs need at least one
                // approval from a reviewer identity (nathanpayne-{agent}).
                // nathanjohnpayne is the PR author, so their approval does not
                // count toward the reviewer approval requirement.
                const reviewerApprovals = approvals.filter(
                  r => reviewerAccounts.includes(r.user.login)
                );
                if (reviewerApprovals.length === 0) {
                  prViolations.push(
                    'External-review PR merged with no reviewer identity approval'
                  );
                }
              }

              // Check 3: Self-approval from bot accounts
              // Under the shared identity model, all PRs are authored by
              // authorIdentity (nathanjohnpayne). The human IS that identity,
              // so nathanjohnpayne approving is legitimate (human tiebreaker).
              // Only flag if a reviewer bot account approved its own PR.
              const reviews = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              const botSelfApproval = reviews.data.some(
                r => r.user.login === pr.user.login &&
                     r.state === 'APPROVED' &&
                     reviewerAccounts.includes(r.user.login)
              );

              if (botSelfApproval) {
                prViolations.push('Bot self-approval detected (reviewer account approved its own PR)');
              }

              // Check 4: Had needs-human-review label — verify it was removed before merge.
              // Under the shared identity model, nathanjohnpayne is the PR author
              // and cannot self-approve via the GitHub review API. The human
              // resolves escalation by removing the label (which unblocks the
              // label-gate check). If the label is still present at merge time,
              // it means the label gate was bypassed.
              const hadHumanLabel = pr.labels.some(
                l => l.name === 'needs-human-review'
              );

              if (hadHumanLabel) {
                prViolations.push(
                  'Merged with `needs-human-review` label still present — human resolution was bypassed'
                );
              }

              // Check 5: Had policy-violation label — should not have been merged
              const hadPolicyViolation = pr.labels.some(
                l => l.name === 'policy-violation'
              );

              if (hadPolicyViolation) {
                prViolations.push(
                  'Merged with `policy-violation` label still present'
                );
              }

              if (prViolations.length > 0) {
                violations.push({
                  number: pr.number,
                  title: pr.title,
                  author: pr.user.login,
                  issues: prViolations,
                });
              }
            }

            if (violations.length > 0) {
              let body = `## PR Review Policy Violations\n\n`;
              body += `**Audit period:** ${sinceISO.split('T')[0]} to ${today}\n`;
              body += `**Violations found:** ${violations.length}\n\n`;
              body += `### Details\n\n`;

              for (const v of violations) {
                body += `- **#${v.number}** — ${v.title} (by ${v.author})\n`;
                for (const issue of v.issues) {
                  body += `  - ${issue}\n`;
                }
              }

              body += `\n---\n\n`;
              body += `Per REVIEW_POLICY.md, these PRs must be retroactively reviewed by a human within one business day.\n\n`;
              body += `cc @nathanjohnpayne`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Weekly PR Audit — ${today}`,
                body: body,
                labels: ['audit'],
              });

              console.log(`Created audit issue with ${violations.length} violations.`);
            } else {
              console.log('No policy violations found for the past 7 days.');
            }
