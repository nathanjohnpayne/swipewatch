# .coderabbit.yml — CodeRabbit configuration
# See https://docs.coderabbit.ai/configuration

language: en-US

tone_instructions: >-
  Focus on bugs, security issues, and correctness over style nitpicks.
  Flag any hardcoded credentials, exposed API keys, or Firebase security
  rule gaps. Keep comments actionable and concise.

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  profile: assertive
  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: true
  collapse_walkthrough: true
  poem: false

  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true

  path_instructions:
    - path: "app.js"
      instructions: >-
        Main application file. This is a large single-file app.
        Review for DOM performance with large datasets (batch DOM
        updates, avoid layout thrashing), proper event listener
        cleanup, and memory leaks from cached content data.
    - path: "firestore.rules"
      instructions: >-
        Firestore security rules. Verify that user data is properly
        scoped — users should only read/write their own preferences
        and watchlists. Flag any overly permissive rules.
    - path: "functions/**"
      instructions: >-
        Firebase Cloud Functions. Review for proper error handling,
        API rate limiting awareness, and that any content APIs are
        called with appropriate authentication.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
