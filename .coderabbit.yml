# .coderabbit.yml — CodeRabbit configuration
# See https://docs.coderabbit.ai/configuration
#
# This file configures CodeRabbit's automated review behavior.
# CodeRabbit is only active on repos where the GitHub App is installed
# (typically public repos only). See .github/review-policy.yml for
# whether this repo has CodeRabbit enabled in the review workflow.

language: en-US

reviews:
  # Post a review on every PR automatically
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Review profile: assertive catches more issues but may produce
  # false positives. Use "chill" for a lighter touch.
  profile: assertive

  # Advisory only — CodeRabbit posts review comments but does not
  # submit a "Changes Requested" review state.
  request_changes_workflow: false

  # Provide a high-level walkthrough summary at the top of each review
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"

  # Professional tone — no poem/haiku at the end
  poem: false

  path_instructions: []
  collapse_walkthrough: false

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
